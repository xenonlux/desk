name: 🏗️ Build Windows EXE

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub Release?"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  build-windows:
    name: Build · Windows x64
    runs-on: windows-latest

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Node.js ────────────────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ─── 3. Rust (stable) ──────────────────────────────────────────
      - name: 🦀 Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ─── 4. Cache Rust build artifacts ────────────────────────────
      - name: 📦 Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ─── 5. Install Node dependencies ─────────────────────────────
      - name: 📦 Install Node dependencies
        run: npm ci

      # ─── 6. Build Vite frontend ────────────────────────────────────
      - name: ⚡ Build Vite frontend
        run: npm run build
        env:
          NODE_ENV: production

      # ─── 7. Build Tauri EXE + MSI ─────────────────────────────────
      - name: 🖥️ Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri

      # ─── 8. Upload EXE artifact ────────────────────────────────────
      - name: 📤 Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: deskbook-windows-exe
          path: |
            src-tauri/target/release/*.exe
          if-no-files-found: error
          retention-days: 30

      # ─── 9. Upload MSI installer artifact ─────────────────────────
      - name: 📤 Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: deskbook-windows-msi
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      # ─── 10. Create GitHub Release (on tag or manual trigger) ─────
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "مقر ديسك ${{ github.ref_name }}"
          body: |
            ## 🖥️ مقر ديسك — تطبيق سطح المكتب

            ### التثبيت:
            - **MSI** → تثبيت تلقائي مع أيقونة في قائمة ابدأ
            - **EXE** → تشغيل مباشر بدون تثبيت

            > يعمل بالكامل دون اتصال بالإنترنت — البيانات تُحفظ محلياً.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
